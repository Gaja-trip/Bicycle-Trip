<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>자전거길 정보 | 자전거여행 함께 가요</title>
    <meta
      name="description"
      content="지도기반 자전거길 정보로 국토종주 자전거길, 지자체 명품 자전거길, 섬 자전거길, 편의시설과 주변정보를 확인합니다."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="bike-roads">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="홈으로 이동"><span class="brand-mark" aria-hidden="true"></span><span>Bicycle Trip</span></a>
      <nav aria-label="주요 페이지">
        <a href="bike-roads.html" aria-current="page">자전거길 정보</a>
        <a href="maps.html">코스 지도</a>
        <a href="festivals.html">전국 행사 달력</a>
        <a href="itineraries.html">여행 일정</a>
        <a href="community.html">커뮤니티</a>
        <a href="login.html">로그인</a>
      </nav>
    </header>

    <main>
      <section class="bike-kakao-service" aria-label="지도기반 자전거길 정보">
        <div class="bike-map-service kakao-version" aria-label="자전거길 지도 정보 서비스">
          <aside class="bike-map-left" aria-label="자전거길 메뉴">
            <div class="bike-map-brand">
              <strong>자전거길 정보</strong>
              <span>Map Service</span>
            </div>
            <nav class="bike-road-menu" id="bikeRoadCategoryMenu" aria-label="자전거길 분류"></nav>
            <div class="bike-road-menu-list" id="bikeRoadMenuList"></div>
          </aside>

          <section class="bike-kakao-stage" aria-label="다음지도 자전거길 지도창">
            <div class="bike-floating-controls" aria-label="지도 컨트롤 영역">
              <div class="bike-layer-panel" id="bikeLayerControls" aria-label="지도 정보 레이어"></div>
              <div class="bike-map-type-control" id="bikeRoadMapTypeControl" aria-label="지도 표시 방식">
                <button class="active" type="button" data-bike-road-map-type="roadmap" aria-label="일반지도" title="일반지도" aria-pressed="true">
                  <span class="map-type-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="m4 6 5-2 6 2 5-2v14l-5 2-6-2-5 2V6Z"/><path d="M9 4v14M15 6v14"/></svg>
                  </span>
                </button>
                <button type="button" data-bike-road-map-type="hybrid" aria-label="항공사진" title="항공사진" aria-pressed="false">
                  <span class="map-type-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M4 15.5 9 5l4 7 2-3 5 6.5V19H4v-3.5Z"/><circle cx="17" cy="6" r="2"/><path d="M4 19h16"/></svg>
                  </span>
                </button>
              </div>
            </div>
            <div id="bikeRoadKakaoMap" class="bike-kakao-canvas">
              <div class="map-placeholder">
                <strong>다음지도를 불러오는 중입니다</strong>
                <span>자전거길과 선택한 레이어가 지도 위에 표시됩니다.</span>
              </div>
            </div>
            <div class="bike-kakao-info" id="bikeMapInfoPanel"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
