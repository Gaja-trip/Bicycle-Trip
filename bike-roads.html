<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>자전거길 정보 | 자전거여행 함께 가요</title>
    <meta
      name="description"
      content="지도기반 자전거길 정보로 국토종주 자전거길, 지자체 명품 자전거길, 섬 자전거길, 편의시설과 주변정보를 확인합니다."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="bike-roads">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="홈으로 이동"><span class="brand-mark" aria-hidden="true"></span><span>자전거여행 함께 가요</span></a>
      <nav aria-label="주요 페이지">
        <a href="bike-roads.html" aria-current="page">자전거길 정보</a>
        <a href="maps.html">코스 지도</a>
        <a href="festivals.html">전국 행사 일정</a>
        <a href="itineraries.html">여행 일정</a>
        <a href="community.html">커뮤니티</a>
        <a href="login.html">로그인</a>
      </nav>
    </header>

    <main>
      <section class="page-hero compact">
        <p class="eyebrow">Bike Road Map</p>
        <h1>지도기반 자전거길 정보</h1>
        <p>다음지도 기반으로 자전거길, 주요거점, 인증센터, 편의시설, 주변정보를 한 화면에서 확인합니다.</p>
      </section>

      <section class="bike-kakao-service" aria-label="지도기반 자전거길 정보">
        <div class="bike-map-service kakao-version" aria-label="자전거길 지도 정보 서비스">
          <aside class="bike-map-left" aria-label="자전거길 메뉴">
            <div class="bike-map-brand">
              <strong>자전거길</strong>
              <span>Bike Road</span>
            </div>
            <nav class="bike-road-menu" id="bikeRoadCategoryMenu" aria-label="자전거길 분류"></nav>
            <div class="bike-road-menu-list" id="bikeRoadMenuList"></div>
            <a class="button dark" id="officialBikeMapLink" href="https://www.bike.go.kr/map/roadMap.do" target="_blank" rel="noreferrer">공식 지도 새 창</a>
          </aside>

          <section class="bike-kakao-stage" aria-label="다음지도 자전거길 지도창">
            <div class="bike-layer-panel" id="bikeLayerControls" aria-label="지도 정보 레이어"></div>
            <div id="bikeRoadKakaoMap" class="bike-kakao-canvas">
              <div class="map-placeholder">
                <strong>다음지도를 불러오는 중입니다</strong>
                <span>자전거길과 선택한 레이어가 지도 위에 표시됩니다.</span>
              </div>
            </div>
            <div class="bike-kakao-info" id="bikeMapInfoPanel"></div>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>공식 지도와 현장 표지판이 우선입니다. 공사, 통제, 우회 구간은 출발 직전 공식 지도와 지자체 공지를 다시 확인하세요.</p>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
