<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bicycle Trip</title>
    <meta
      name="description"
      content="전국의 자전거길, 축제, 맛집, 카페, 주요 거점, 코스를 확인하고 함께 라이딩할 수 있는 국내 자전거여행 큐레이션 홈페이지"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="홈으로 이동">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Bicycle Trip</span>
      </a>
      <nav aria-label="주요 페이지">
        <a href="bike-roads.html">자전거길 정보</a>
        <a href="maps.html">코스 지도</a>
        <a href="festivals.html">전국 행사 달력</a>
        <a href="itineraries.html">여행 일정</a>
        <a href="community.html">커뮤니티</a>
        <a href="login.html">로그인</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-media" aria-hidden="true">
          <video autoplay muted playsinline preload="metadata" poster="assets/seomjingang-bike-hero.png" data-hero-video>
            <source src="mp4/Main%20Page.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">Ride Together Korea</p>
          <h1>BICYCLE TRIIP</h1>
          <p>
            전국의 자전거길, 축제, 맛집, 카페, 주요 거점, 코스를 확인하고
            함께 라이딩할 수 있는 국내 자전거여행 큐레이션입니다.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="festivals.html">전국 행사 달력 보기</a>
            <a class="button" href="maps.html">코스 지도 열기</a>
          </div>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>2026 전국 행사 일정</h2>
        </div>
        <div class="home-schedule-tools" aria-label="2026 행사 일정 보기 옵션">
          <div class="schedule-view-tabs" id="homeScheduleMode" role="group" aria-label="일정 보기 방식">
            <button class="active" type="button" data-home-schedule-mode="year">2026 연중</button>
          </div>
          <div class="home-schedule-selects">
            <label class="sort-control" id="homeMonthControl">
              <span>월</span>
              <select id="homeMonthFilter"></select>
            </label>
            <label class="sort-control" id="homeRegionControl">
              <span>지역</span>
              <select id="homeRegionFilter"></select>
            </label>
          </div>
          <p class="calendar-meta" id="homeScheduleMeta">2026년 연중 일정을 불러오는 중입니다.</p>
        </div>
        <div class="route-grid simple" id="homeSchedule"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Bicycle Trip은 탄소를 감축하는 자전거 모임과 동행합니다.</p>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
